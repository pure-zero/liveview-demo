# fly.toml app configuration file generated for phxproj-withered-dew-982 on 2026-03-28T22:36:02+13:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'phxproj-withered-dew-982'
primary_region = 'syd'
kill_signal = 'SIGTERM'

[build]

[env]
  PHX_HOST = 'phxproj-withered-dew-982.fly.dev'
  PORT = '8080'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

  [http_service.concurrency]
    type = 'connections'
    hard_limit = 1000
    soft_limit = 1000

[[vm]]
  memory = '1gb'
  cpus = 1
  memory_mb = 1024
